name: React+Vite CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: リポジトリのコードをチェックアウト
      uses: actions/checkout@v4
      
    - name: Node.jsのセットアップ
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        
    - name: 依存関係のインストール
      run: npm ci
      
    - name: Lint（静的解析）の実行
      run: npm run lint
      
    - name: 単体テストの実行 # 追加したステップ
      run: npm test
      
    - name: 型チェックとビルドの実行
      run: npm run build